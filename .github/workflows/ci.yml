name: CI

# main/PR 푸시 시 자동 테스트 (SQLite 인메모리 → 외부 DB 불필요)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: pip install -r backend/requirements.txt

      - name: 테스트 실행
        working-directory: backend
        run: python -m pytest -q
